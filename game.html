:: Story
An interactive narrative inspired by Joseph Conrad's Heart of Darkness. Your choices shape your journey into the African wilderness and the moral darkness within.

<div style="text-align: center; padding: 2rem;">
<h1>🌍 Heart of the Congo</h1>
<p style="font-style: italic; color: #c0a080;">An Interactive Journey into Darkness and Discovery</p>
</div>

<div style="background: rgba(0, 0, 0, 0.5); padding: 2rem; border-radius: 8px; border-left: 4px solid #d4af37; margin: 2rem 0;">

## Welcome, Traveler

In the autumn of 1890, the Company makes you an offer. The pay is extraordinary, the prospects uncertain. You will venture into the heart of Africa, where civilization fades into shadow and every choice carries weight.

Your decisions will shape your destiny. Will you emerge enlightened, corrupted, or lost in the darkness?

<strong>Warning:</strong> This story contains themes of imperialism, moral ambiguity, and darkness.

</div>

[[Begin: Brussels|Brussels Opening]]


:: Brussels Opening
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37; margin-bottom: 1rem;">I. The Contract — Brussels, Autumn 1890</h2>

Brussels in the autumn of 1890 is a city that always makes you think of a whited sepulchre. The cobblestones are scrubbed; the windows are scrubbed; the very air seems polished and artificial. You sit in an office that smells of wood and leather, across from a thin man with cold eyes.

"The Company," he says, "requires men of ambition."

He slides a contract across the desk. The salary is extraordinary. Three years in Africa. The position: ivory trader and station manager.

They want ambition, and ambition is something you have in abundance.

But then you must see the Company doctor.

Down the hall, the Company doctor measures your skull with a cold pair of calipers. He smiles thinly. In the tropics, what one must observe is discipline. Order. Proper specimens.

"You will do well," he says, fitting the calipers to your temples. "The climate will test you. Some men collapse under the pressure. Some men transform."

You feel the cold metal press against your head.

[[Challenge his measurements — resist the Company's pseudoscience|Resist Authority]]
[[Accept the doctrine — embrace the order they offer|Accept Authority]]


:: Resist Authority
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">Your Defiance</h2>

You push back from the chair. "This is nonsense," you say. "Measuring skulls to predict a man's worth?"

The doctor's smile becomes thin as a knife edge. "Bold," he says quietly. "That will either serve you well in Africa, or destroy you."

You leave his office without signing further documents. But the contract is already signed.

<em>You have taken your first step toward independence and danger. The Company does not forget defiance.</em>

[[Continue to the Coast|Disembark at the Station]]


:: Accept Authority
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">Your Submission</h2>

You nod. The calipers fit perfectly. The doctor's approval washes over you like a benediction.

"Excellent," he says. "You understand. The Company values men who understand order. Men who know their place in the hierarchy. You will do well."

You feel a strange comfort in his words. The Company knows what it wants. All you must do is comply.

<em>You have accepted the Company's doctrine. Obedience may bring safety—or make you complicit in horrors you cannot yet imagine.</em>

[[Continue to the Coast|Disembark at the Station]]


:: Disembark at the Station
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37; margin-bottom: 1rem;">II. The Coast — The Central Station</h2>

You disembark into a clearing that the Company calls a Station. A boiler wallows in the grass, useless. An overturned railway-truck lies on its back, its wheels pointing at the sky.

The buildings are crude timber structures, already half-rotted. Around them, the forest presses in—dark, patient, ancient. It smells of green things decomposing, of humidity and disease.

Then you meet the Manager.

He is a common, ordinary man—neither tall nor short, neither fat nor lean, with eyes the color of a cold fire. He smiles at you, but the smile does not warm his face.

"Welcome," he says, "to the heart of the Company's ambitions."

He tells you about the station. About the men who have died here. About Kurtz, the ivory trader upriver at the Inner Station, who sends down more ivory than all other stations combined.

"A remarkable man," the Manager says. "Truly remarkable."

But there is something in his voice—envy, perhaps, or fear.

That night, you see the grove.

It lies beyond the station, where the forest is darkest. The locals fear it. They call it the Grove of Death.

[[Venture into the Grove of Death|Explore the Grove]]
[[Avoid the grove and gather information instead|Avoid the Grove]]


:: Explore the Grove
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">The Grove of Death</h2>

You step aside from the path and into a shadow under the trees. The shadow is full of shapes.

Black shapes. Crouched, lying, sitting between the trees, leaning against the bark.

Bodies. Dozens of them.

Some are skeletal, bones picked clean. Others are recent enough that you can smell the decay. They are everywhere, hidden in shadow, waiting in the humid dark.

You understand, in that moment, the true cost of the Company's ambitions. These are the workers—the men brought here, worked to death, and simply left to rot in the forest.

<em>You have witnessed the depths of the Company's cruelty. This knowledge will change you.</em>

You stumble back to the station, your mind reeling.

[[Continue upriver toward Kurtz|Go Upriver]]
[[Turn back to civilization|Turn Back]]


:: Avoid the Grove
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">Prudence and Shadows</h2>

You stay on the path. You don't venture into the darkness.

Instead, you speak with the other traders. You learn about the workers who vanish into the forest. About the ivory that flows downstream. About the Manager's resentment of Kurtz's success.

But you don't see the Grove of Death with your own eyes. Some truths, perhaps, are easier to ignore.

<em>You have chosen not to know. But ignorance is not innocence.</em>

The Manager approaches you with a proposition. "I need someone I can trust," he says. "Someone who won't be seduced by Kurtz's mystique. Will you help me?"

[[Trust the Manager and help him|Trust Manager]]
[[Question the Manager's intentions|Question Manager]]


:: Trust Manager
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">An Alliance of Convenience</h2>

You agree to help the Manager. In exchange, he ensures your supply shipments are prioritized. Your comfort increases. You become one of the Manager's men.

But you also become complicit in his schemes. You help him undermine reports about conditions at the station. You assist in covering up the deaths.

The Manager smiles at you more often now.

<em>You have made a devil's bargain. Comfort and safety in exchange for your moral integrity.</em>

[[Depart upriver to the Inner Station|Go Upriver]]


:: Question Manager
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">A Dangerous Question</h2>

"Why do you fear Kurtz so much?" you ask.

The Manager's smile hardens. "I fear nothing," he says coldly. "But Kurtz is... unstable. He forgets that the Company's rules apply to everyone. He has begun to see himself as something more than a mere trader."

He steps closer. "If you go to him, remember: the ivory is what matters. Not Kurtz. Not his genius. Not his influence over the natives. The ivory."

You realize, then, that the Manager is threatened by Kurtz in ways he cannot admit. Kurtz represents something the Manager can never be—a man of vision, perhaps, or a man of principle. Or a man who has crossed into madness.

<em>You have chosen skepticism and independence. But these come with danger.</em>

[[Depart upriver to the Inner Station|Go Upriver]]


:: Go Upriver
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37; margin-bottom: 1rem;">III. The River — Journey Upstream</h2>

Going up that river was like travelling back to the earliest beginnings of the world, when vegetation rioted on the earth and the big trees were kings. The water is dark, opaque, impenetrable. The forest presses in from both sides, and you feel like you are being swallowed by something alive and hungry.

Your crew becomes uneasy. They hear sounds in the darkness—chanting, singing, sounds that seem to come from everywhere and nowhere.

Eight miles below the Inner Station, the attack comes.

Arrows fall from the bank like a shower of nothing. Sticks, little sticks, were flying about—thick: they came in a ceaseless, steady stream. One of your men screams and falls. Another grabs for an arrow lodged in his shoulder.

You shout orders. Return fire. Return fire!

The arrows stop. The forest goes silent again.

<em>Blood has been spilled. You are no longer a mere trader—you are a soldier in a colonial war.</em>

[[Continue upstream toward Kurtz—you've come too far to turn back|Inner Station Arrival]]
[[Turn back before it is too late|Turn Back]]


:: Turn Back
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">The Road Back</h2>

You order the steamer to turn around. Your crew is relieved, but also ashamed. You survived, but at what cost? The ivory trade will continue without you. Kurtz will continue to accumulate power.

You descend the river in silence, the forest watching you go.

When you reach the coast, you resign from the Company and return to civilization. But something is broken in you. You see the European cities with new eyes, understanding now the blood beneath their polished facades.

You write letters to newspapers. You tell what you saw. No one believes you.

<strong>ENDING: The Uncertain Witness</strong>

You survived, but carried home a burden of knowledge that no one will accept. Perhaps that is the greatest curse of all.

[[Start Over|Start]]


:: Inner Station Arrival
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37; margin-bottom: 1rem;">IV. The Inner Station — Meeting Kurtz</h2>

The bush around the Inner Station is silent in a way the river never was. A long, decaying building on the summit is half buried in the high grass. Around it, crude figures stand like sentries—human heads, mounted on poles, their empty eyes watching the approach of your boat.

Your crew recoils in horror.

Then Kurtz emerges.

They carry him out on a stretcher—a long, thin shadow of a man, all bone, with a head like an ivory ball. His eyes shine, large and lustrous, burning with an inner fire. He is dying, clearly, rotted away by fever and something else, something internal.

"Welcome," he says, his voice surprisingly strong. "Welcome to the Temple of Truth."

He gestures to the heads on the poles. "They worship me here. I have brought them to civilization. To order. To understanding."

You realize, with creeping horror, that Kurtz has become a god to these people. And he has become something other than human himself.

He coughs violently, blood speckling his lips.

"I am dying," he says matter-of-factly. "The question now is what happens to my legacy. Will you preserve it? Will you protect the truth I have discovered? Or will you return to the lies of civilization?"

[[Attempt to rescue Kurtz—try to save his life and his mind|Help Kurtz]]
[[Leave Kurtz to his fate—take only the ivory and depart|Abandon Kurtz]]


:: Help Kurtz
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">The Rescue</h2>

You lift Kurtz yourself and carry him aboard the steamer. He is light as paper, fragile as a shadow.

All night, as the river carries you downstream, Kurtz speaks. He tells you his vision of Africa, of humanity, of power. His words are brilliant and terrible in equal measure. Some of what he says is madness. Some of it is truth.

At dawn, his breathing becomes shallow.

"Promise me," he whispers. "Promise me you will tell them. Tell them what you saw. Tell them what is possible."

You promise, though you don't fully understand what you're promising.

He dies in the afternoon, his hand in yours. His last words are: "The horror... the horror..."

<em>You are changed. You carry Kurtz's final vision with you, though you don't yet know what it means.</em>

When you reach civilization, you have to decide what to do with your knowledge.

[[Tell the truth about Kurtz and what you witnessed|Witness Truth]]
[[Stay silent—carry the burden alone|Disillusioned]]


:: Abandon Kurtz
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">The Choice</h2>

You leave him to the dark.

Your crew loads the ivory—so much ivory—into the steamer's hold. Kurtz calls out to you, but you don't look back. The river is patient. The jungle is patient. They will have their due.

By morning the steamer is twenty miles downriver and there is nothing behind you but green walls closing one upon the other, and the memory of Kurtz's dying voice calling after you.

The ivory sells for a fortune. The Company rewards you with a promotion. You become the Manager of the coastal station, replacing the old one who eventually drinks himself to death.

But in the quiet hours before dawn, you see Kurtz's eyes. You hear his voice: "The horror... the horror..."

<strong>ENDING: The Disillusioned Wanderer</strong>

You escaped with your life and your fortune, but Kurtz's final words haunt you. You are successful, promoted, wealthy—and utterly hollow. The paradise the Company promised has become a prison of your own making.

[[Start Over|Start]]


:: Witness Truth
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">Speaking the Truth</h2>

You tell everyone. You tell the Company directors. You tell the newspapers. You tell the public.

You tell them about the Grove of Death. About the heads on the poles. About Kurtz's vision and his madness and his truth.

Some believe you. Many don't. The Company denies everything. But your testimony creates waves. Investigations are launched. The African operations are eventually reformed—not much, but some.

You become known as the man who spoke against the Company. Your career in the trade is finished. But your conscience is clear.

<strong>ENDING: The Witness</strong>

You carry Kurtz's final vision forward into the world. It is a burden, but it is also a purpose. You are the living testimony to what happened in the darkness. And perhaps, that is enough.

[[Start Over|Start]]


:: Disillusioned
{background color: #1a1a1a; color: #f0f0f0;}
<h2 style="color: #d4af37;">The Burden of Silence</h2>

You say nothing. You claim the ivory was lost. You report that Kurtz died of natural causes. You live a comfortable life, well-provided for by the Company.

But Kurtz's final words echo in your mind, endless and terrible: "The horror... the horror..."

You understand now what he meant. The horror is not the jungle, not the violence, not even the cruelty of the Company's operations. The horror is the ease with which good men become complicit in evil. The way comfort and silence make monsters of us all.

<strong>ENDING: The Complicit</strong>

You are safe, successful, and damned. The Company rewards loyalty with wealth, but the price is your soul. You will spend the rest of your life in beautiful, affluent damnation.

[[Start Over|Start]]
